name: radianos

services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: radian_forge
      POSTGRES_USER: radian
      POSTGRES_PASSWORD: forge_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radian -d radian_forge"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
